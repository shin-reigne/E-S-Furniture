<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
</head>
<body style="background-color: yellow; text-align: center; padding-top: 10%;">

    <h1 style="font-weight: bold;">Login</h1>

    <form action="#" method="post" style="background-color: white; padding: 30px; display: inline-block; text-align: left; 
        border-radius: 10px; box-shadow: 0px 4px 10px rgb; width: 300px;">
        
        <label for="username">Username</label> <br>
        <input type="text" id="username" name="username" 
            style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;"> 
        <br>
        
        <label for="password">Password</label> <br>
        <input type="password" id="password" name="password" 
            style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;"> 
        <br>
        
        <input type="submit" value="Login" style="width: 100%; padding: 10px; background-color: aqua; color: white; border: none; border-radius: 5px; cursor: pointer;"> <br><br>
        <p> Don't have an account yet? <a align:"center" href=""> Register <br> here!</a></p>
        
</body>
</html>
